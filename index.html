<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SukiStore</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: pan-x pan-y;
            -webkit-tap-highlight-color: transparent;
            tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 15px;
            position: relative;
            overflow-x: hidden;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            overscroll-behavior: contain;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            display: block;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            background: rgba(200, 230, 255, 0.08);
            backdrop-filter: blur(25px);
            border-radius: 25px;
            padding: 30px 15px 15px 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(100, 200, 255, 0.15),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(200, 230, 255, 0.15);
            animation: slideDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(74, 158, 255, 0.4),
                    rgba(0, 212, 255, 0.4),
                    transparent);
            animation: scan 4s ease-in-out infinite;
        }

        .view-counter {
            position: absolute;
            top: 10px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75em;
            font-weight: 600;
            color: #8db9e8;
            letter-spacing: 0.3px;
            z-index: 10;
            opacity: 0.9;
        }

        .view-counter svg {
            width: 14px;
            height: 14px;
            stroke: #00d4ff;
            fill: none;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes slideDown {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(180, 220, 255, 0.08);
            padding: 6px;
            border-radius: 18px;
            border: 1px solid rgba(200, 230, 255, 0.1);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .tab {
            flex: 1;
            padding: 10px 8px;
            border: none;
            background: transparent;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.75em;
            color: #8db9e8;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .tab::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(74, 158, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease-out, height 0.6s ease-out;
        }

        .tab:hover::before {
            width: 150%;
            height: 150%;
        }

        .tab:hover {
            color: #d4ebff;
            transform: translateY(-1px);
            background: rgba(74, 158, 255, 0.05);
        }

        @media (max-width: 480px) {
            .tab { font-size: 0.6em; padding: 7px 5px; }
            .card-title { font-size: 0.8em; }
            .card-subtitle { font-size: 0.65em; }
            .view-counter { font-size: 0.65em; top: 12px; right: 15px; }
            .view-counter svg { width: 12px; height: 12px; }
        }

        .tab.active {
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.85), rgba(0, 212, 255, 0.85));
            color: white;
            box-shadow: 0 4px 16px rgba(74, 158, 255, 0.35),
                        inset 0 1px 1px rgba(255, 255, 255, 0.2);
            animation: tabPulse 3s ease-in-out infinite;
        }

        @keyframes tabPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 4px 16px rgba(74, 158, 255, 0.35),
                            inset 0 1px 1px rgba(255, 255, 255, 0.2);
            }
            50% {
                transform: scale(1.03);
                box-shadow: 0 6px 20px rgba(74, 158, 255, 0.5),
                            inset 0 1px 1px rgba(255, 255, 255, 0.3),
                            0 0 12px rgba(74, 158, 255, 0.4);
            }
        }

        .content {
            display: none;
            animation: fadeIn 0.5s;
        }

        .content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: rgba(200, 230, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 30px rgba(100, 200, 255, 0.2),
                        inset 0 1px 2px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(200, 230, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(150, 220, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 45px rgba(74, 158, 255, 0.4),
                        inset 0 1px 3px rgba(255, 255, 255, 0.3),
                        0 0 20px rgba(74, 158, 255, 0.2);
            border-color: rgba(150, 210, 255, 0.5);
        }

        .card:hover::after {
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 0.3; }
            50% { transform: translate(-30%, -30%) rotate(180deg); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) rotate(360deg); opacity: 0.3; }
        }

        .card img {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 3px 15px rgba(74, 158, 255, 0.3);
            transition: transform 0.3s;
            border: 1px solid rgba(200, 230, 255, 0.3);
        }

        .card:hover img {
            transform: rotate(5deg) scale(1.1);
        }

        .card-info {
            flex: 1;
        }

        .card-title {
            font-size: 0.85em;
            font-weight: 700;
            color: #e0f2ff;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .card-subtitle {
            font-size: 0.7em;
            color: #a3d5ff;
            font-weight: 600;
            background: rgba(74, 158, 255, 0.25);
            padding: 3px 10px;
            border-radius: 8px;
            display: inline-block;
            border: 1.5px solid rgba(150, 210, 255, 0.3);
        }

        .card-subtitle.alert {
            color: #ffb3b3;
            background: rgba(255, 80, 80, 0.25);
            border-color: rgba(255, 120, 120, 0.3);
        }

        .info-box {
            background: rgba(200, 230, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 8px 30px rgba(100, 200, 255, 0.2),
                        inset 0 1px 2px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(200, 230, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .info-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg,
                    rgba(74, 158, 255, 0.3),
                    rgba(0, 212, 255, 0.3),
                    rgba(74, 158, 255, 0.3));
            background-size: 300% 300%;
            animation: gradientShift 6s ease infinite;
            border-radius: 18px;
            z-index: -1;
        }

        .info-box::after {
            content: '';
            position: absolute;
            top: 10px;
            right: 10px;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .info-box h2 {
            font-size: 1em;
            background: linear-gradient(135deg, #4a9eff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .info-box p {
            color: #b3d9ff;
            line-height: 1.5;
            margin-bottom: 8px;
            font-size: 0.85em;
        }

        .info-box.promote {
            background: rgba(150, 200, 255, 0.15);
            border: 1px solid rgba(150, 200, 255, 0.3);
            box-shadow: 0 8px 30px rgba(70, 150, 220, 0.2);
        }

        .info-box.promote h2 {
            background: linear-gradient(135deg, #7af49a, #4ac3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="header">
            <div style="position: absolute; top: 10px; left: 20px; font-size: 0.75em; font-weight: 600; color: #8db9e8; letter-spacing: 0.3px; z-index: 10; opacity: 0.9;">by Nstorm</div>
            <div class="view-counter">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                73,2k Pengunjung
            </div>
            <div class="tabs">
                <button class="tab active" data-tab="wajib-follow" onclick="window.location.href='https://whatsapp.com/channel/0029Vb6t3YqIXnluSByJvh1g'">( WAJIB FOLLOW )</button>
            </div>
        </div>

        <div class="content active" id="wajib-follow">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({
            canvas,
            antialias: true,
            alpha: true
        });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        camera.position.z = 30;

        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);

        const snowLayers = [];
        const snowCount = 5000;

        for (let layer = 0; layer < 3; layer++) {
            const snowGeometry = new THREE.BufferGeometry();
            const posArray = new Float32Array(snowCount * 3);
            const velocities = [];

            for (let i = 0; i < snowCount; i++) {
                const i3 = i * 3;
                posArray[i3] = (Math.random() - 0.5) * 150;
                posArray[i3 + 1] = Math.random() * 150 - 50;
                posArray[i3 + 2] = (Math.random() - 0.5) * 150;

                velocities.push({
                    y: -(Math.random() * 0.1 + 0.05) * (layer + 1),
                    x: (Math.random() - 0.5) * 0.02,
                    swing: Math.random() * 0.05
                });
            }

            snowGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const snowMaterial = new THREE.PointsMaterial({
                size: 0.2 + layer * 0.2,
                color: 0xffffff,
                transparent: true,
                opacity: 0.9 - layer * 0.2,
                blending: THREE.AdditiveBlending,
                map: createRoundSnowTexture(),
                depthWrite: false
            });

            const snowMesh = new THREE.Points(snowGeometry, snowMaterial);
            snowMesh.userData.velocities = velocities;
            snowMesh.userData.layer = layer;

            snowLayers.push(snowMesh);
            scene.add(snowMesh);
        }

        function createRoundSnowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');

            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.5)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);

            const texture = new THREE.Texture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            snowLayers.forEach((snowMesh, layerIndex) => {
                const positions = snowMesh.geometry.attributes.position.array;
                const velocities = snowMesh.userData.velocities;

                for (let i = 0; i < positions.length / 3; i++) {
                    const i3 = i * 3;

                    positions[i3 + 1] += velocities[i].y;
                    positions[i3] += Math.sin(time + i) * velocities[i].swing;
                    positions[i3] += velocities[i].x;
                    positions[i3] += mouseX * 0.01 * (layerIndex + 1);
                    positions[i3 + 1] += mouseY * 0.01 * (layerIndex + 1);

                    if (positions[i3 + 1] < -75) {
                        positions[i3 + 1] = 75;
                        positions[i3] = (Math.random() - 0.5) * 150;
                    }

                    if (positions[i3] > 75) positions[i3] = -75;
                    if (positions[i3] < -75) positions[i3] = 75;
                }

                snowMesh.geometry.attributes.position.needsUpdate = true;
            });

            camera.position.x = Math.sin(time * 0.1) * 2;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const tabs = document.querySelectorAll('.tab');
        const contents = document.querySelectorAll('.content');
        const cards = document.querySelectorAll('.card');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                contents.forEach(c => c.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.update();
                });
            });
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
</body>
</html>
